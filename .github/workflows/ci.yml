name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      root: ${{ steps.filter.outputs.root }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'services/backend/**'
            frontend:
              - 'services/frontend/**'
            root:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'eslint.config.js'
              - 'prettier.config.js'
              - 'commitlint.config.js'
              - '.github/workflows/**'
              - '.nvmrc'
              - '.node-version'
              - '.npmrc'
              - '.releaserc.json'

  lint-root:
    name: Lint root configs
    needs: changes
    if: needs.changes.outputs.root == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint

  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.root == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      NODE_ENV: test
      MONGODB_URL: mongodb://localhost:27017/test-db
      JWT_SECRET: test-jwt-secret
      JWT_ACCESS_EXPIRATION_MINUTES: 30
      JWT_REFRESH_EXPIRATION_DAYS: 30
      JWT_RESET_PASSWORD_EXPIRATION_MINUTES: 10
      JWT_VERIFY_EMAIL_EXPIRATION_MINUTES: 10
      SMTP_HOST: ''
      SMTP_PORT: 587
      SMTP_USERNAME: ''
      SMTP_PASSWORD: ''
      EMAIL_FROM: test@test.com
      PORT: 3000
      SENTRY_DSN: ''
      STRIPE_SECRET_KEY: ''
      STRIPE_WEBHOOK_SECRET: ''
      STRIPE_PUBLISHABLE_KEY: ''
      TWILIO_ACCOUNT_SID: ''
      TWILIO_AUTH_TOKEN: ''
      TWILIO_PHONE_NUMBER: ''
      TWILIO_VERIFY_SERVICE_SID: ''
      TWILIO_WEBHOOK_URL: ''
      TWILIO_WHATSAPP_NUMBER: ''
      TWILIO_WEBHOOK_BASE_URL: ''
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @gsoft/backend lint

      - name: Format check
        run: pnpm --filter @gsoft/backend format:check

      - name: Create .env for tests
        run: cp services/backend/.env.example services/backend/.env

      - name: Run tests with coverage
        run: pnpm --filter @gsoft/backend test:ci

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: services/backend/coverage/
          retention-days: 7

      - name: Upload coverage to Code Climate
        if: env.CC_TEST_REPORTER_ID != ''
        run: |
          curl -L https://codeclimate.com/downloads/test-reporter/test-reporter-latest-linux-amd64 > ./cc-test-reporter
          chmod +x ./cc-test-reporter
          ./cc-test-reporter before-build
          ./cc-test-reporter after-build --exit-code $?
        env:
          CC_TEST_REPORTER_ID: ${{ secrets.CC_TEST_REPORTER_ID }}

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.root == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @gsoft/frontend lint

      - name: Build
        run: pnpm --filter @gsoft/frontend build

  ci-success:
    name: CI Success
    if: always()
    needs: [lint-root, backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.lint-root.result }}" == "failure" || \
                "${{ needs.backend.result }}" == "failure" || \
                "${{ needs.frontend.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed or were skipped"
