name: Node.js LTS Tracker

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-lts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect latest LTS major version
        id: lts
        run: |
          LATEST_LTS=$(curl -fsSL https://nodejs.org/dist/index.json \
            | jq '[.[] | select(.lts != false)] | sort_by(.version | ltrimstr("v") | split(".") | map(tonumber)) | last | .version | ltrimstr("v") | split(".")[0]' -r)
          CURRENT=$(cat .nvmrc | tr -d '[:space:]')
          echo "latest=$LATEST_LTS" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current: $CURRENT, Latest LTS: $LATEST_LTS"

      - name: Check for existing PR
        if: steps.lts.outputs.latest != steps.lts.outputs.current
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/nodejs-lts-v${{ steps.lts.outputs.latest }}"
          OPEN=$(gh pr list --head "$BRANCH" --state open --json number --jq 'length')
          echo "open=$OPEN" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Update version files
        if: steps.lts.outputs.latest != steps.lts.outputs.current && steps.existing.outputs.open == '0'
        env:
          NEW_VERSION: ${{ steps.lts.outputs.latest }}
          CURRENT_VERSION: ${{ steps.lts.outputs.current }}
        run: |
          echo "$NEW_VERSION" > .nvmrc
          echo "$NEW_VERSION" > .node-version

          sed -i "s/\"node\": \">=.*\"/\"node\": \">=${NEW_VERSION}.0.0\"/" package.json
          sed -i "s/\"node\": \">=.*\"/\"node\": \">=${NEW_VERSION}.0.0\"/" services/backend/package.json

          sed -i "s/FROM node:${CURRENT_VERSION}-alpine/FROM node:${NEW_VERSION}-alpine/" services/backend/docker/Dockerfile

      - name: Create pull request
        if: steps.lts.outputs.latest != steps.lts.outputs.current && steps.existing.outputs.open == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.lts.outputs.latest }}
          BRANCH: ${{ steps.existing.outputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore(ci): bump Node.js LTS to v${NEW_VERSION}"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore(ci): bump Node.js LTS to v${NEW_VERSION}" \
            --body "## Summary

          - Bumps Node.js LTS version from v${{ steps.lts.outputs.current }} to v${NEW_VERSION}
          - Updates \`.nvmrc\`, \`.node-version\`, \`package.json\` engines, and Dockerfile

          ## Updated files

          - \`.nvmrc\`
          - \`.node-version\`
          - \`package.json\` (\`engines.node\`)
          - \`services/backend/package.json\` (\`engines.node\`)
          - \`services/backend/docker/Dockerfile\` (\`FROM\` image)

          > Auto-generated by the Node.js LTS Tracker workflow." \
            --label "dependencies" \
            --label "area: ci"
