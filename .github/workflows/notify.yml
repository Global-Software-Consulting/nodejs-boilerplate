name: Slack Notifications

on:
  workflow_run:
    workflows: [CI, Docker, Security]
    types: [completed]

permissions:
  contents: read

jobs:
  notify:
    name: Send Slack notification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      github.event.workflow_run.conclusion == 'failure' ||
      (github.event.workflow_run.name == 'Docker' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ github.event.workflow_run.conclusion }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: |
            Workflow *${{ github.event.workflow_run.name }}* ${{ github.event.workflow_run.conclusion }} on `${{ github.event.workflow_run.head_branch }}`
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
