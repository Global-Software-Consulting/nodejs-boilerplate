version: '2'

checks:
  argument-count:
    config:
      threshold: 5
  complex-logic:
    config:
      threshold: 5
  file-lines:
    config:
      threshold: 300
  method-complexity:
    config:
      threshold: 10
  method-lines:
    config:
      threshold: 30
  return-statements:
    config:
      threshold: 4

plugins:
  eslint:
    enabled: true
    channel: 'eslint-9'
  duplication:
    enabled: true
    config:
      languages:
        javascript:
          mass_threshold: 40

exclude_patterns:
  - 'node_modules/'
  - 'coverage/'
  - '**/tests/'
  - '**/test/'
  - '**/*.test.js'
  - '**/*.spec.js'
  - 'dist/'
  - '.github/'
