version: '3'

services:
  node-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: node-app
    environment:
      - DB_ADAPTER=sequelize
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/node-boilerplate
    ports:
      - '3000:3000'
    depends_on:
      - postgres
    volumes:
      - .:/usr/src/node-app
    networks:
      - node-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: node-boilerplate
    ports:
      - '5432:5432'
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - node-network

volumes:
  dbdata:

networks:
  node-network:
    driver: bridge
